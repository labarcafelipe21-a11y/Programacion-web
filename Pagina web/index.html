<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Arcade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Estacion Arcade - ¡Tu entretención total!</h1>
    </header>

    <main>
        <section class="seccion">
            <h2>Juegos de la semana</h2>
            <div class="grid-3-columnas">
                <div class="item-video">
                    <video controls>
                        <source src="videos/video1.mp4" type="video/mp4">
               
                    </video>
                </div>
                <div class="item-video">
                    <video controls>
                        <source src="videos/video2.mp4" type="video/mp4">
                       
                    </video>
                </div>
                <div class="item-video">
           <iframe src="https://www.youtube-nocookie.com/embed/WbN40vpse0k?si=H1mfdlj8LTeQJMss"
        title="Lobotomy Corporation Trailer"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <section class="seccion">
            <h2>Nuestros productos</h2>
            <div class="grid-3-columnas">
                <div class="item-producto">
                    <img src="images/switch.jpg" alt="Nintendo Switch">
                    <h3>Nintendo Switch</h3>
                </div>
                <div class="item-producto">
                    <img src="images/xbox.jpg" alt="Nintendo Switch Lite">
                    <h3>Xbox Series X</h3>
                </div>
                <div class="item-producto">
                    <img src="images/ps5.jpg" alt="PlayStation 5">
                    <h3>PlayStation 5</h3>
                </div>
            </div>
        </section>

        <section class="seccion seccion-contacto">
            <h2>Contacto</h2>
            <form action="gracias.html" method="GET" class="formulario-centrado">
                <div class="grupo-form">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="grupo-form">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>
                <div class="grupo-form">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" required>
                </div>
                <div class="grupo-form">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Empresa de Videojuegos Todos los derechos reservados.</p>
    </footer>

</body>
</html>
